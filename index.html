<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cheat the Chic</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f2ea;
        --panel: #fffaf4;
        --text: #201814;
        --muted: #6d5c52;
        --line: #d8c8b8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.75), transparent 45%),
          linear-gradient(180deg, var(--bg), #efe5d8);
        color: var(--text);
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        width: min(100%, 640px);
        padding: 40px 32px;
        border: 1px solid var(--line);
        background: var(--panel);
        text-align: center;
        box-shadow: 0 18px 48px rgba(32, 24, 20, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Cheat the Chic</h1>
      <p>Coming soon. Issue 01 is being prepared.</p>
    </main>
  </body>
</html>
